<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text-primary: #f0f0f0;
      --text-secondary: #6b6b6b;
      --accent: #f0f0f0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 2.5rem;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 3rem;
    }

    .notify-form {
      display: flex;
      gap: 8px;
      max-width: 360px;
      margin: 0 auto;
    }

    .notify-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .notify-form input::placeholder {
      color: var(--text-secondary);
    }

    .notify-form input:focus {
      border-color: #333;
    }

    .notify-form button {
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .notify-form button:hover {
      opacity: 0.85;
    }

    .success-msg {
      display: none;
      font-size: 14px;
      color: #4ade80;
      margin-top: 1rem;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      Under Construction
    </div>

    <h1>Something is<br />on its way.</h1>

    <div class="divider"></div>

    <p>We're working on something. Leave your email<br />and we'll let you know when it's ready.</p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="your@email.com" required />
      <button type="submit">Notify me</button>
    </form>

    <p class="success-msg" id="success">You're on the list. We'll be in touch.</p>
  </div>

  <footer>
    &copy; <span id="year"></span> &mdash; Coming soon.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const success = document.getElementById('success');
      form.style.display = 'none';
      success.style.display = 'block';
    }
  </script>

</body>
</html>
